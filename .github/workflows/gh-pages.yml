name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # If your site needs a build step (e.g., using a static site generator),
      # add install/build steps here. Example:
      # - name: Install
      #   run: npm ci
      # - name: Build
      #   run: npm run build
      # and set `path` below to the build output folder (e.g., ./dist or ./public)

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
